name: Release

# Trigger: push a tag like v0.1.0
# git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # needed to create GitHub Releases and upload assets

jobs:
  build-and-release:
    name: Build Windows Binary
    runs-on: windows-latest  # must be Windows — uses windows-rs and WMI, cannot cross-compile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Rename binary with version tag
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME}
          cp target/x86_64-pc-windows-msvc/release/velox.exe velox-${VERSION}-x86_64-windows.exe

      - name: Create GitHub Release and upload binary
        uses: softprops/action-gh-release@v2
        with:
          name: "Velox ${{ github.ref_name }}"
          body: |
            ## Velox ${{ github.ref_name }}

            Windows x86-64 binary. No installer needed — download and run.

            **Requirements:** Windows 10 or 11, Windows Terminal recommended.

            See [README](https://github.com/${{ github.repository }}/blob/main/README.md) for keybindings and usage.
          files: velox-${{ github.ref_name }}-x86_64-windows.exe
          fail_on_unmatched_files: true
