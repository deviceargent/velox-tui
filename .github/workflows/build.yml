name: Build Velox
on: [push, workflow_dispatch] # Se activa cuando guardás o a mano

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup update stable
      - name: Build
        run: cargo build --release
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: velox-windows
          path: target/release/velox-tui.exe
